name: Build and Push Images

on:
  # Keep automatic publishing disabled until image release cadence is settled.
  # push:
  #   branches:
  #     - main
  #   tags:
  #     - 'v*'
  workflow_dispatch:
    inputs:
      web:
        description: Build and push web
        type: boolean
        default: true
      control_plane:
        description: Build and push control-plane
        type: boolean
        default: true
      daytona:
        description: Build and push Daytona
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  validate:
    name: Validate image selection
    runs-on: ubuntu-latest
    steps:
      - name: Require at least one image
        run: |
          if [ "${{ inputs.web }}" != "true" ] && [ "${{ inputs.control_plane }}" != "true" ] && [ "${{ inputs.daytona }}" != "true" ]; then
            echo "Select at least one image to build and push."
            exit 1
          fi

  build:
    name: Build ${{ matrix.image.name }}
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: web
            input: web
            dockerfile: apps/web/Dockerfile
            image: ghcr.io/sidpalas/deputies-web
            platforms: linux/amd64,linux/arm64
            provenance: true
          - name: control-plane
            input: control_plane
            dockerfile: apps/control-plane/Dockerfile
            image: ghcr.io/sidpalas/deputies-control-plane
            platforms: linux/amd64,linux/arm64
            provenance: true
          - name: daytona
            input: daytona
            dockerfile: deploy/daytona/Dockerfile
            image: ghcr.io/sidpalas/deputies-daytona
            platforms: linux/amd64
            provenance: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # TODO: Switch to Namespace or Depot builders for faster multi-arch builds.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: ${{ inputs[matrix.image.input] }}
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ matrix.image.image || format('{0}/{1}-{2}', env.REGISTRY, github.repository, matrix.image.name) }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish image
        if: ${{ inputs[matrix.image.input] }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.image.platforms }}
          push: true
          provenance: ${{ matrix.image.provenance }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
