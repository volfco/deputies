[tools]
node = "24"
pnpm = "10.33"

[tasks.install]
description = "Install project dependencies"
run = "pnpm install"

[tasks.test]
description = "Run unit tests"
run = "pnpm test"

[tasks.typecheck]
description = "Run TypeScript type checking"
run = "pnpm typecheck"

[tasks.check]
description = "Run typecheck and tests"
depends = ["typecheck", "test"]

[tasks.portless-start]
description = "Start the local HTTPS wildcard portless proxy"
run = "pnpm portless:start"

[tasks.portless-alias-web]
description = "Route https://deputies.localhost to the Vite web dev server"
run = "pnpm portless:alias:web"

[tasks.deploy-control-plane]
description = "Deploy the control-plane service to Railway"
run = "railway up --service control-plane --detach -m 'deploy control-plane'"

[tasks.deploy-web]
description = "Deploy the web service to Railway"
run = "railway up --service web --detach -m 'deploy web'"

[tasks.deploy]
description = "Deploy control-plane and web services to Railway"
depends = ["deploy-control-plane", "deploy-web"]

[tasks.daytona-image-build]
description = "Build the Daytona sandbox image"
# Daytona pulls amd64 images, and disabling provenance/SBOM avoids extra
# unknown/unknown GHCR attestation manifests that can confuse image resolution.
run = """
docker buildx build \
  --platform ${DAYTONA_IMAGE_PLATFORM:-linux/amd64} \
  --provenance=false \
  --sbom=false \
  -f deploy/daytona/Dockerfile \
  -t ${DAYTONA_IMAGE:-ghcr.io/sidpalas/deputies-daytona:ubuntu24-node24-pg16-playwright1.59.1} \
  --load \
  .
"""

[tasks.daytona-image-push]
description = "Build and push the Daytona sandbox image"
run = """
docker buildx build \
  --platform ${DAYTONA_IMAGE_PLATFORM:-linux/amd64} \
  --provenance=false \
  --sbom=false \
  -f deploy/daytona/Dockerfile \
  -t ${DAYTONA_IMAGE:-ghcr.io/sidpalas/deputies-daytona:ubuntu24-node24-pg16-playwright1.59.1} \
  --push \
  .
"""

[tasks.daytona-image-publish]
description = "Build and push the Daytona sandbox image"
depends = ["daytona-image-push"]
