apiVersion: v1
kind: ServiceAccount
metadata:
  name: deputies-control-plane
  namespace: deputies
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deputies-sandbox-manager
  namespace: deputies
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deputies-control-plane-sandbox-manager
  namespace: deputies
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: deputies-sandbox-manager
subjects:
  - kind: ServiceAccount
    name: deputies-control-plane
    namespace: deputies
