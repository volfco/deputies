name: deputies

services:
  control-plane:
    image: deputies-control-plane
    build:
      context: ../..
      dockerfile: apps/control-plane/Dockerfile
    env_file:
      - ../../.env.local
    environment:
      PORT: 3583
      FLUE_OPENAI_CODEX_AUTH_FILE: /run/secrets/openai-codex-auth.json
      DATABASE_URL: postgres://flue:flue@postgres:5432/flue
      TEST_DATABASE_URL: postgres://flue:flue@postgres:5432/flue_test
      AUTH_SUCCESS_REDIRECT_URL: http://localhost:5173
      WEB_BASE_URL: http://localhost:5173
      GITHUB_APP_CALLBACK_URL: http://localhost:5173/auth/oauth/github/callback
    ports:
      - '3583:3583'
    depends_on:
      control-plane-migrate:
        condition: service_completed_successfully
    volumes:
      - ${HOME}/.pi/agent/auth.json:/run/secrets/openai-codex-auth.json

  control-plane-migrate:
    image: deputies-control-plane
    build:
      context: ../..
      dockerfile: apps/control-plane/Dockerfile
    env_file:
      - ../../.env.local
    environment:
      DATABASE_URL: postgres://flue:flue@postgres:5432/flue
    command: ['node', 'apps/control-plane/dist/db/migrate.js']
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: deputies-web
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ''
    environment:
      PORT: 5173
      API_UPSTREAM: http://control-plane:3583
    ports:
      - '5173:5173'
    depends_on:
      - control-plane

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: flue
      POSTGRES_PASSWORD: flue
      POSTGRES_DB: flue
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-test-db.sql:/docker-entrypoint-initdb.d/10-init-test-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flue -d flue']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
