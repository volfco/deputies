name: deputies-smoke

services:
  control-plane-migrate:
    env_file: !reset []
    environment:
      API_AUTH_MODE: none
      AUTH_PROVIDER: static
      APP_DATA_STORE: postgres
      DATABASE_URL: postgres://flue:flue@postgres:5432/flue
      RUNNER: fake
      SANDBOX_PROVIDER: fake
      FAKE_RUNNER_ARTIFACT_JSON: '{"type":"file","title":"Smoke Artifact","content":"hello artifact storage","contentType":"text/plain","fileName":"smoke-artifact.txt"}'
      ANTHROPIC_API_KEY: ''
      OPENAI_API_KEY: ''
      FLUE_OPENAI_CODEX_AUTH_FILE: ''
      FLUE_OPENAI_CODEX_AUTH_JSON: ''
      FLUE_OPENAI_CODEX_AUTH_BASE64: ''
      DAYTONA_API_KEY: ''
      GITHUB_APP_ID: ''
      GITHUB_APP_PRIVATE_KEY: ''
      GITHUB_OAUTH_CLIENT_ID: ''
      GITHUB_OAUTH_CLIENT_SECRET: ''
      GITHUB_WEBHOOK_SECRET: ''
      SLACK_SIGNING_SECRET: ''
      SLACK_BOT_TOKEN: ''

  control-plane:
    env_file: !reset []
    environment:
      API_AUTH_MODE: none
      AUTH_PROVIDER: static
      APP_DATA_STORE: postgres
      RUNNER: fake
      SANDBOX_PROVIDER: fake
      FAKE_RUNNER_ARTIFACT_JSON: '{"type":"file","title":"Smoke Artifact","content":"hello artifact storage","contentType":"text/plain","fileName":"smoke-artifact.txt"}'
      ANTHROPIC_API_KEY: ''
      OPENAI_API_KEY: ''
      FLUE_OPENAI_CODEX_AUTH_FILE: ''
      FLUE_OPENAI_CODEX_AUTH_JSON: ''
      FLUE_OPENAI_CODEX_AUTH_BASE64: ''
      DAYTONA_API_KEY: ''
      GITHUB_APP_ID: ''
      GITHUB_APP_PRIVATE_KEY: ''
      GITHUB_OAUTH_CLIENT_ID: ''
      GITHUB_OAUTH_CLIENT_SECRET: ''
      GITHUB_WEBHOOK_SECRET: ''
      GITHUB_ALLOWED_REPOSITORIES: acme/widget,acme/api
      SLACK_SIGNING_SECRET: ''
      SLACK_BOT_TOKEN: ''
      FLUE_MODEL: fake/smoke-default
      FLUE_MODEL_OPTIONS: fake/smoke-default,fake/smoke-fast
      ARTIFACT_STORAGE_PROVIDER: s3
      ARTIFACT_STORAGE_S3_ENDPOINT: http://seaweedfs:8333
      ARTIFACT_STORAGE_S3_BUCKET: deputies-artifacts
      ARTIFACT_STORAGE_S3_ACCESS_KEY_ID: seaweed
      ARTIFACT_STORAGE_S3_SECRET_ACCESS_KEY: seaweed
      ARTIFACT_STORAGE_S3_CREATE_BUCKET: 'true'
    volumes: !reset []
    ports: !reset []
    depends_on:
      control-plane-migrate:
        condition: service_completed_successfully
      seaweedfs:
        condition: service_healthy

  postgres:
    ports: !reset []

  seaweedfs:
    ports: !reset []
    healthcheck:
      test:
        ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:8333/ >/dev/null; code=$$?; [ $$code -eq 0 ] || [ $$code -eq 8 ]']
      interval: 1s
      timeout: 5s
      retries: 30

  web:
    ports: !override
      - '15173:5173'
    volumes: []
