name: deputies

include:
  # Includes shared services: postgres, control-plane-migrate, and web.
  - docker-compose.common.yml

services:
  control-plane:
    image: deputies-control-plane
    build:
      context: ../..
      dockerfile: apps/control-plane/Dockerfile
    env_file:
      - ../../.env.local
    environment:
      PORT: 3583
      RUN_MODE: all
      FLUE_OPENAI_CODEX_AUTH_FILE: /run/secrets/openai-codex-auth.json
      DATABASE_URL: postgres://flue:flue@postgres:5432/flue
      TEST_DATABASE_URL: postgres://flue:flue@postgres:5432/flue_test
      DOCKER_ORCHESTRATOR_MODE: in-process
      DOCKER_SANDBOX_BRIDGE_HOST: host.docker.internal
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AUTH_SUCCESS_REDIRECT_URL: ${AUTH_SUCCESS_REDIRECT_URL:-https://deputies.localhost}
      WEB_BASE_URL: ${WEB_BASE_URL:-https://deputies.localhost}
      GITHUB_APP_CALLBACK_URL: ${GITHUB_APP_CALLBACK_URL:-https://deputies.localhost/auth/oauth/github/callback}
      PREVIEW_BASE_DOMAIN: ${PREVIEW_BASE_DOMAIN:-deputies.localhost}
      PREVIEW_TRUST_FORWARDED_HOSTS: ${PREVIEW_TRUST_FORWARDED_HOSTS:-true}
      ARTIFACT_STORAGE_PROVIDER: s3
      ARTIFACT_STORAGE_S3_ENDPOINT: http://seaweedfs:8333
      ARTIFACT_STORAGE_S3_BUCKET: deputies-artifacts
      ARTIFACT_STORAGE_S3_ACCESS_KEY_ID: seaweed
      ARTIFACT_STORAGE_S3_SECRET_ACCESS_KEY: seaweed
      ARTIFACT_STORAGE_S3_CREATE_BUCKET: 'true'
    ports:
      - '3583:3583'
    user: root
    depends_on:
      control-plane-migrate:
        condition: service_completed_successfully
      seaweedfs:
        condition: service_started
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      default:
        aliases:
          - api
    volumes:
      - ${HOME}/.pi/agent/auth.json:/run/secrets/openai-codex-auth.json
      - /var/run/docker.sock:/var/run/docker.sock
