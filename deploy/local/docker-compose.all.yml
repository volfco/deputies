name: deputies

include:
  # Includes shared services: postgres, control-plane-migrate, and web.
  - docker-compose.common.yml

services:
  control-plane:
    image: deputies-control-plane
    build:
      context: ../..
      dockerfile: apps/control-plane/Dockerfile
    env_file:
      - ../../.env.local
    environment:
      PORT: 3583
      RUN_MODE: all
      FLUE_OPENAI_CODEX_AUTH_FILE: /run/secrets/openai-codex-auth.json
      DATABASE_URL: postgres://flue:flue@postgres:5432/flue
      TEST_DATABASE_URL: postgres://flue:flue@postgres:5432/flue_test
      DOCKER_ORCHESTRATOR_MODE: in-process
      DOCKER_SANDBOX_BRIDGE_HOST: host.docker.internal
      AUTH_SUCCESS_REDIRECT_URL: http://localhost:5173
      WEB_BASE_URL: http://localhost:5173
      GITHUB_APP_CALLBACK_URL: http://localhost:5173/auth/oauth/github/callback
    ports:
      - '3583:3583'
    user: root
    depends_on:
      control-plane-migrate:
        condition: service_completed_successfully
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      default:
        aliases:
          - api
    volumes:
      - ${HOME}/.pi/agent/auth.json:/run/secrets/openai-codex-auth.json
      - /var/run/docker.sock:/var/run/docker.sock
